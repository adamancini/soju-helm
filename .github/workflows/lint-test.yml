name: Lint and Test

on:
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/lint-test.yml'
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/lint-test.yml'

jobs:
  lint-chart:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm Lint
        run: helm lint charts/soju --strict

      - name: Helm Template (default values)
        run: |
          helm template soju charts/soju \
            --set soju.domain=test.example.com \
            --debug

      - name: Helm Template (all CI value files)
        run: |
          for f in charts/soju/ci/*.yaml; do
            echo "=== Testing with ${f} ==="
            helm template soju charts/soju -f "${f}" --debug > /dev/null
            echo "  OK"
          done

  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -c .yamllint.yml charts/soju/values.yaml charts/soju/Chart.yaml charts/soju/ci/

  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s-version:
          - "1.28.0"
          - "1.29.0"
          - "1.30.0"
          - "1.31.0"
          - "1.32.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Manifests (K8s ${{ matrix.k8s-version }})
        run: |
          for f in charts/soju/ci/*.yaml; do
            echo "=== Validating with ${f} against K8s ${{ matrix.k8s-version }} ==="
            helm template soju charts/soju -f "${f}" \
              | kubeconform -strict -summary \
                -kubernetes-version ${{ matrix.k8s-version }} \
                -ignore-missing-schemas
          done

  security-scan-chart:
    name: Security Scan Helm Chart
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy for Helm Chart
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'charts/'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  chart-testing:
    name: Chart Testing (ct)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.10.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          ct install \
            --target-branch ${{ github.event.repository.default_branch }} \
            --helm-extra-set-args '--set=soju.domain=test.example.com --set=admin.enabled=false --set=certificate.enabled=false --set=tls.existingSecret=fake-tls'
