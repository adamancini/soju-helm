{{- if and .Values.admin.enabled (not .Values.admin.existingSecret) }}
{{- $secretName := printf "%s-admin" (include "soju.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "soju.fullname" . }}-admin
  labels:
    {{- include "soju.labels" . | nindent 4 }}
type: Opaque
data:
  # Precedence: explicit value > existing in-cluster value > random.
  # Set admin.password (or admin.existingSecret) for GitOps/ArgoCD, where the
  # in-cluster lookup is unavailable and the random fallback would be regenerated
  # on every render.
  admin-username: {{ .Values.admin.username | default "admin" | b64enc | quote }}
  admin-password: {{ include "soju.resolveSecret" (dict "ctx" . "value" .Values.admin.password "secretName" $secretName "key" "admin-password" "length" 24) | quote }}
{{- end }}
