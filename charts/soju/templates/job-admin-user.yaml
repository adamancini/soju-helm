{{- if .Values.admin.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "soju.fullname" . }}-admin-setup
  labels:
    {{- include "soju.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "soju.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-setup
    spec:
      restartPolicy: OnFailure
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: create-admin
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        command:
        - sh
        - -c
        - |
          echo "$ADMIN_PASS" | sojudb -config /etc/soju/config create-user "$ADMIN_USER" -admin
        env:
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "soju.adminSecretName" . }}
              key: admin-username
        - name: ADMIN_PASS
          valueFrom:
            secretKeyRef:
              name: {{ include "soju.adminSecretName" . }}
              key: admin-password
        volumeMounts:
        - name: config
          mountPath: /etc/soju
          readOnly: true
        - name: data
          mountPath: /data
      volumes:
      - name: config
        configMap:
          name: {{ include "soju.fullname" . }}-config
          items:
          - key: config
            path: config
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "soju.fullname" . }}-data
{{- end }}
