{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "soju.fullname" . }}
  labels:
    {{- include "soju.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "soju.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from ingress controller (WebSocket + gamja)
  - from:
    - namespaceSelector:
        matchLabels:
          {{- toYaml .Values.networkPolicy.ingressControllerLabels | nindent 10 }}
    ports:
    - protocol: TCP
      port: 8080
  # Allow direct IRC connections (if LoadBalancer enabled)
  {{- if .Values.loadBalancer.enabled }}
  - ports:
    {{- if .Values.listeners.ircs }}
    - protocol: TCP
      port: 6697
    {{- end }}
    {{- if .Values.listeners.irc }}
    - protocol: TCP
      port: 6667
    {{- end }}
  {{- end }}
  egress:
  # DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Outbound IRC connections to upstream servers
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 6667
    - protocol: TCP
      port: 6697
    - protocol: TCP
      port: 443
{{- end }}
