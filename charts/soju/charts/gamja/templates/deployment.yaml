apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gamja.fullname" . }}
  labels:
    {{- include "gamja.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gamja.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gamja.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: gamja
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
          failureThreshold: 3
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /usr/share/gamja/config.json
          subPath: config.json
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: {{ include "gamja.fullname" . }}-config
