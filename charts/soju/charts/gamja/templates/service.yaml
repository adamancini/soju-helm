apiVersion: v1
kind: Service
metadata:
  name: {{ include "gamja.fullname" . }}
  labels:
    {{- include "gamja.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    name: http
    protocol: TCP
  selector:
    {{- include "gamja.selectorLabels" . | nindent 4 }}
